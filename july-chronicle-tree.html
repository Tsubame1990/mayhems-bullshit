<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>July chronicle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<script>
/* ==========================================================
   STORYTELLER DATA — edit this block only.
   Each diamond is a scene.
   prog: 0–100 (drives node/path lighting; never shown as a number).
   deps: which scenes this one grows from (multiple = a join).
   Multiple scenes sharing one dep = a split.
   deadEnd: true marks a severed scene line (terminus bar below node).
   col: 0.5 (left) / 1.5 (center) / 2.5 (right). row: depth.
   ========================================================== */
const THREADS = [
  {id:'start', name:'START', prog:100, note:'', col:1.5, row:0, deps:[], isStart:true},

  {id:'t1', name:'Scene 1', prog:100, col:0.5, row:1, deps:['start'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.'},

  {id:'t2', name:'Scene 2', prog:100, col:1.5, row:1, deps:['start'], deadEnd:true,
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut enim ad minim veniam, quis nostrud exercitation ullamco.'},

  {id:'t3', name:'Scene 3', prog:100, col:2.5, row:1, deps:['start'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Duis aute irure dolor in reprehenderit in voluptate velit esse.'},

  {id:'t4', name:'Scene 4', prog:40, col:0.5, row:2, deps:['t1'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Excepteur sint occaecat cupidatat non proident, sunt in culpa.'},

  {id:'t5', name:'Scene 5', prog:100, col:1.5, row:2, deps:['t1'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed ut perspiciatis unde omnis iste natus error sit voluptatem.'},

  {id:'t6', name:'Scene 6', prog:55, col:2.5, row:2, deps:['t3'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut.'},

  {id:'t7', name:'Scene 7', prog:0, col:1.5, row:3, deps:['t5','t6'],
   note:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet.'}
];
/* ========================================================== */
</script>

<style>
  :root{
    --woodsmoke:#100E11;
    --sepia:#2C0001;
    --rose:#490206;
    --rose-lit:#7a2a2e;
    --pink-swan:#C0B5B3;
    --dove:#706B68;
    --dead:#17090b;
    --dead-rim:#33181c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--woodsmoke); color:var(--pink-swan);
    font-family:'Cormorant Garamond', Georgia, serif; min-height:100%; overflow-x:hidden;}

  .frame{max-width:520px; margin:0 auto; padding:10px 10px 30px; position:relative;}
  .inner{border:1px solid var(--rose); position:relative; padding:6px;}
  .inner::before{content:''; position:absolute; inset:5px; border:1px solid var(--rose);
    pointer-events:none; opacity:.55;}
  .corner{position:absolute; width:34px; height:34px; pointer-events:none; opacity:.9;}
  .corner svg{width:100%; height:100%; display:block;}
  .c-tl{top:-6px; left:-6px;}
  .c-tr{top:-6px; right:-6px; transform:scaleX(-1);}
  .c-bl{bottom:-6px; left:-6px; transform:scaleY(-1);}
  .c-br{bottom:-6px; right:-6px; transform:scale(-1);}

  header{text-align:center; padding:26px 16px 10px;}
  header h1{font-family:'UnifrakturMaguntia', serif; font-weight:400; font-size:34px;
    margin:0; color:var(--pink-swan); text-shadow:0 0 18px rgba(73,2,6,.9);}
  .rule{display:flex; align-items:center; gap:10px; justify-content:center; margin:10px 0 0;}
  .rule .line{height:1px; width:70px; background:linear-gradient(90deg, transparent, var(--rose-lit));}
  .rule .line.r{background:linear-gradient(90deg, var(--rose-lit), transparent);}
  .rule .gem{width:7px; height:7px; background:var(--rose); transform:rotate(45deg);
    border:1px solid var(--rose-lit);}

  #stage{width:100%; display:block; margin-top:6px;}

  .node-label{fill:var(--pink-swan); font-family:'Cormorant Garamond', Georgia, serif;
    font-size:14px; font-weight:500; letter-spacing:.4px; pointer-events:none;}
  .node-label.dim{fill:var(--dove);}
  .start-label{fill:var(--pink-swan); font-family:'UnifrakturMaguntia', serif;
    font-size:17px; letter-spacing:2px; pointer-events:none;}
  .node-hit{cursor:pointer;}

  #veil{position:fixed; inset:0; background:rgba(16,14,17,.82); display:none;
    align-items:center; justify-content:center; padding:24px; z-index:10;}
  #card{max-width:420px; width:100%; background:var(--sepia); border:1px solid var(--rose-lit);
    padding:24px 26px; position:relative;}
  #card::before{content:''; position:absolute; inset:5px; border:1px solid var(--rose); opacity:.6; pointer-events:none;}
  #card h2{font-family:'UnifrakturMaguntia', serif; font-weight:400; font-size:24px; margin:0 0 12px; color:var(--pink-swan);}
  #card p{font-size:16px; line-height:1.65; margin:0; color:var(--pink-swan); opacity:.88;}
  #card .close{margin-top:20px; text-align:center; font-size:12px; letter-spacing:3px;
    color:var(--dove); text-transform:uppercase; cursor:pointer;}


  @media (prefers-reduced-motion: no-preference){
    .flicker{animation:flick 2.6s ease-in-out infinite;}
    @keyframes flick{
      0%,100%{opacity:1;} 42%{opacity:.86;} 47%{opacity:.96;} 74%{opacity:.9;}
    }
  }
</style>
</head>
<body>
<div class="frame">
  <div class="inner">
    <div class="corner c-tl"><svg viewBox="0 0 34 34"><path d="M2 32 L2 10 Q2 2 10 2 L32 2" fill="none" stroke="#7a2a2e" stroke-width="1.4"/><path d="M6 28 L6 13 Q6 6 13 6 L28 6" fill="none" stroke="#490206" stroke-width="1"/><circle cx="9" cy="9" r="2" fill="#490206" stroke="#7a2a2e" stroke-width=".8"/><path d="M2 18 Q7 16 6 10" fill="none" stroke="#490206" stroke-width=".8"/><path d="M18 2 Q16 7 10 6" fill="none" stroke="#490206" stroke-width=".8"/></svg></div>
    <div class="corner c-tr"><svg viewBox="0 0 34 34"><path d="M2 32 L2 10 Q2 2 10 2 L32 2" fill="none" stroke="#7a2a2e" stroke-width="1.4"/><path d="M6 28 L6 13 Q6 6 13 6 L28 6" fill="none" stroke="#490206" stroke-width="1"/><circle cx="9" cy="9" r="2" fill="#490206" stroke="#7a2a2e" stroke-width=".8"/><path d="M2 18 Q7 16 6 10" fill="none" stroke="#490206" stroke-width=".8"/><path d="M18 2 Q16 7 10 6" fill="none" stroke="#490206" stroke-width=".8"/></svg></div>
    <div class="corner c-bl"><svg viewBox="0 0 34 34"><path d="M2 32 L2 10 Q2 2 10 2 L32 2" fill="none" stroke="#7a2a2e" stroke-width="1.4"/><path d="M6 28 L6 13 Q6 6 13 6 L28 6" fill="none" stroke="#490206" stroke-width="1"/><circle cx="9" cy="9" r="2" fill="#490206" stroke="#7a2a2e" stroke-width=".8"/><path d="M2 18 Q7 16 6 10" fill="none" stroke="#490206" stroke-width=".8"/><path d="M18 2 Q16 7 10 6" fill="none" stroke="#490206" stroke-width=".8"/></svg></div>
    <div class="corner c-br"><svg viewBox="0 0 34 34"><path d="M2 32 L2 10 Q2 2 10 2 L32 2" fill="none" stroke="#7a2a2e" stroke-width="1.4"/><path d="M6 28 L6 13 Q6 6 13 6 L28 6" fill="none" stroke="#490206" stroke-width="1"/><circle cx="9" cy="9" r="2" fill="#490206" stroke="#7a2a2e" stroke-width=".8"/><path d="M2 18 Q7 16 6 10" fill="none" stroke="#490206" stroke-width=".8"/><path d="M18 2 Q16 7 10 6" fill="none" stroke="#490206" stroke-width=".8"/></svg></div>

    <header>
      <h1 class="flicker">July chronicle</h1>
      <div class="rule"><span class="line"></span><span class="gem"></span><span class="line r"></span></div>
    </header>

    <svg id="stage"></svg>

  </div>
</div>

<div id="veil">
  <div id="card">
    <h2 id="cname"></h2>
    <p id="cnote"></p>
    <div class="close" onclick="document.getElementById('veil').style.display='none'">— close —</div>
  </div>
</div>

<script>
const svg=document.getElementById('stage');
const NS='http://www.w3.org/2000/svg';
const W=380, COLW=110, ROWH=124, DIAM=82, TOP=26;

function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function pos(n){return {x:40+n.col*COLW, y:TOP+n.row*ROWH+DIAM/2};}

function styleFor(n){
  if(n.isStart||n.prog>=100) return {fill:'#490206', rim:'#C0B5B3', rw:1.8, glow:true, inner:'#7a2a2e'};
  if(n.prog>=50) return {fill:'#3a0203', rim:'#8a4a4a', rw:1.4, glow:false, inner:'#5a2226'};
  if(n.prog>0)  return {fill:'#2C0001', rim:'#490206', rw:1.2, glow:false, inner:'#490206'};
  return {fill:'#17090b', rim:'#33181c', rw:1, glow:false, inner:'#2a1216'};
}

function render(){
  const maxRow=Math.max(...THREADS.map(n=>n.row));
  const H=TOP+maxRow*ROWH+DIAM+34;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const defs=el('defs',{});
  const f=el('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  const bl=el('feGaussianBlur',{'in':'SourceGraphic',stdDeviation:'3.2',result:'b'});
  const mg=el('feMerge',{});
  mg.appendChild(el('feMergeNode',{'in':'b'}));
  mg.appendChild(el('feMergeNode',{'in':'SourceGraphic'}));
  f.appendChild(bl); f.appendChild(mg); defs.appendChild(f);
  svg.appendChild(defs);

  THREADS.forEach(n=>{
    n.deps.forEach(d=>{
      const from=THREADS.find(x=>x.id===d); if(!from)return;
      const a=pos(from), b=pos(n);
      const lit=from.prog>=100;
      const ay=a.y+(from.isStart?20:DIAM/2), by=b.y-DIAM/2;
      const mid=(ay+by)/2;
      if(lit){
        svg.appendChild(el('path',{
          d:`M${a.x},${ay} C${a.x},${mid} ${b.x},${mid} ${b.x},${by}`,
          fill:'none', stroke:'#490206', 'stroke-width':4, opacity:0.35}));
      }
      svg.appendChild(el('path',{
        d:`M${a.x},${ay} C${a.x},${mid} ${b.x},${mid} ${b.x},${by}`,
        fill:'none', stroke:lit?'#C0B5B3':'#33181c',
        'stroke-width':lit?1.8:1.2, 'stroke-linecap':'round',
        opacity:lit?0.85:1}));
    });
  });

  THREADS.forEach(n=>{
    const p=pos(n), s=styleFor(n);
    const g=el('g',{class:'node-hit'});
    if(!n.isStart) g.addEventListener('click',()=>show(n));

    if(n.isStart){
      const w=260,h=38;
      const r=el('rect',{x:p.x-w/2,y:p.y-h/2,width:w,height:h,
        fill:'#490206',stroke:'#C0B5B3','stroke-width':1.6});
      r.setAttribute('filter','url(#glow)');
      g.appendChild(r);
      g.appendChild(el('rect',{x:p.x-w/2+4,y:p.y-h/2+4,width:w-8,height:h-8,
        fill:'none',stroke:'#7a2a2e','stroke-width':1}));
      g.appendChild(el('path',{d:`M${p.x-w/2-10},${p.y} l-8,-5 v10 z M${p.x+w/2+10},${p.y} l8,-5 v10 z`,
        fill:'#7a2a2e'}));
      const t=el('text',{x:p.x,y:p.y+6,'text-anchor':'middle',class:'start-label'});
      t.textContent='Start';
      g.appendChild(t);
      svg.appendChild(g);
      return;
    }

    const half=DIAM/2;
    const outer=el('path',{
      d:`M${p.x},${p.y-half} L${p.x+half},${p.y} L${p.x},${p.y+half} L${p.x-half},${p.y} Z`,
      fill:s.fill, stroke:s.rim, 'stroke-width':s.rw});
    if(s.glow) outer.setAttribute('filter','url(#glow)');
    g.appendChild(outer);

    const ih=half-7;
    g.appendChild(el('path',{
      d:`M${p.x},${p.y-ih} L${p.x+ih},${p.y} L${p.x},${p.y+ih} L${p.x-ih},${p.y} Z`,
      fill:'none', stroke:s.inner, 'stroke-width':0.9, opacity:0.8}));

    g.appendChild(el('circle',{cx:p.x, cy:p.y-half, r:2.2, fill:s.rim}));
    g.appendChild(el('circle',{cx:p.x, cy:p.y+half, r:2.2, fill:s.rim}));

    const cls=n.prog===0?'node-label dim':'node-label';
    const t=el('text',{x:p.x,y:p.y+5,'text-anchor':'middle',class:cls});
    t.textContent=n.name;
    g.appendChild(t);

    if(n.deadEnd){
      const ty=p.y+half+14;
      g.appendChild(el('line',{x1:p.x-16,y1:ty,x2:p.x+16,y2:ty,
        stroke:'#7a2a2e','stroke-width':2,'stroke-linecap':'round'}));
      g.appendChild(el('line',{x1:p.x-9,y1:ty+5,x2:p.x+9,y2:ty+5,
        stroke:'#490206','stroke-width':1.5,'stroke-linecap':'round'}));
      g.appendChild(el('line',{x1:p.x,y1:p.y+half+2,x2:p.x,y2:ty-3,
        stroke:'#490206','stroke-width':1.2}));
    }

    svg.appendChild(g);
  });
}

function show(n){
  document.getElementById('cname').textContent=n.name;
  document.getElementById('cnote').textContent=n.note||'The Storyteller has recorded nothing here. Yet.';
  document.getElementById('veil').style.display='flex';
}
document.getElementById('veil').addEventListener('click',e=>{
  if(e.target.id==='veil') e.target.style.display='none';
});

render();
</script>
</body>
</html>
